<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Раскрывающееся меню</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #77d3e8 0%, #6ddc7e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .menu-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .menu-item {
            margin-bottom: 10px;
            border-radius: 10px;
            overflow: hidden;
        }
        .menu-title {
            background: #7ed0fc;
            color: white;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .menu-title:hover {
            background: #3fdd57;
            padding-left: 20px;
        }
        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #f8f9fa;
            border-radius: 0 0 10px 10px;
        }
        .menu-content ul {
            list-style: none;
            padding: 15px;
        }
        .menu-content li {
            padding: 8px 0;
            color: #555;
            border-bottom: 1px solid #e0e0e0;
        }
        .menu-content li:last-child {
            border-bottom: none;
        }
        .menu-item.open .menu-title {
            background: #64c727;
            border-radius: 10px 10px 0 0;
        }
        .menu-item.open .menu-content {
            max-height: 200px;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>🍽️ Меню</h1>
        <div class="menu-item">
            <div class="menu-title">🥧 Сладости (~нажми меня!~)</div>
            <div class="menu-content">
                <ul>
                    <li>Торт</li>
                    <li>Пончик</li>
                    <li>Пирожное</li>
                </ul>
            </div>
        </div>
        <div class="menu-item">
            <div class="menu-title">Фрукты</div>
            <div class="menu-content">
                <ul>
                    <li>Яблоко</li>
                    <li>Банан</li>
                    <li>Апельсин</li>
                </ul>
            </div>
        </div>
        <div class="menu-item">
            <div class="menu-title">Напитки</div>
            <div class="menu-content">
                <ul>
                    <li>Кофе</li>
                    <li>Чай</li>
                    <li>Сок</li>
                </ul>
            </div>
        </div>
    </div>
    <script>
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            const title = item.querySelector('.menu-title');
            const content = item.querySelector('.menu-content');
            title.addEventListener('click', () => {
                item.classList.toggle('open');
                if (item.classList.contains('open')) {
                    content.style.maxHeight = content.scrollHeight + 'px';
                } else {
                    content.style.maxHeight = null;
                }
            });
        });
    </script>
</body>
</html>
