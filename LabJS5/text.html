<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Скрыть/Показать текст</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        #text {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 12px;
            color: #555;
            line-height: 1.6;
            margin: 20px 0;
            transition: all 0.3s;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Скрыть/Показать текст</h1>
        <div id="text">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
        </div>
        <button id="toggleBtn">Скрыть текст</button>
    </div>
    <script>
        const textElement = document.getElementById('text');
        const button = document.getElementById('toggleBtn');
        button.addEventListener('click', function() {
            if (textElement.classList.contains('hidden')) {
                textElement.classList.remove('hidden');
                button.textContent = 'Скрыть текст';
            } else {
                textElement.classList.add('hidden');
                button.textContent = 'Показать текст';
            }
        });
    </script>
</body>
</html>
